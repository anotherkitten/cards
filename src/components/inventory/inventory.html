<div class="grid">
	<div class="limit">
		Resource Limit: {{resourceService.resourceCap()}} 
	</div>
	@for (row of grid; track $index) {
	<div class="row">
		@for (item of row; track $index) {
		<div class="item" [ngClass]="item.color">
			<div class="label">
				{{item.quantity}} {{item.name}}
			</div>
			<app-inventory-glow [id]="item.id"></app-inventory-glow>
		</div>}
	</div>}
</div>
